name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 强制开启 Node 24 环境
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 升级到 v4 解决 Node.js 警告

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # 使用最新的稳定版本

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          # 强制触发部署测试